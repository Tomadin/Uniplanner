};

const WEEKDAY_OPTIONS = [
  { key: 'MO', label: 'Lun' },
  { key: 'TU', label: 'Mar' },
  { key: 'WE', label: 'Mié' },
  { key: 'TH', label: 'Jue' },
  { key: 'FR', label: 'Vie' },
  { key: 'SA', label: 'Sáb' },
  { key: 'SU', label: 'Dom' },
];

const ScheduleEditor = ({ schedule, onChange, subjectColor }) => {
  const add = () => onChange([...(schedule || []), { day: 'MO', start: '08:00', end: '09:30', label: '' }]);
  const remove = (i) => onChange(schedule.filter((_, idx) => idx !== i));
  const update = (i, patch) => onChange(schedule.map((s, idx) => idx === i ? { ...s, ...patch } : s));

  return (
    <div style={{ marginBottom: 16 }}>
      <Label style={{ marginBottom: 8 }}>Días y horarios</Label>
      <div style={{
        fontSize: 11, color: UP_TOKENS.inkMuted, fontFamily: UP_TOKENS.fontUI,
        marginBottom: 10, lineHeight: 1.5,
      }}>
        Agregá cuántos bloques necesites. Cada bloque se agenda automáticamente en el calendario semana a semana.
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {(schedule || []).map((slot, i) => (
          <div key={i} style={{
            display: 'flex', alignItems: 'center', gap: 6,
            background: UP_TOKENS.bg,
            border: `1px solid ${UP_TOKENS.lineSoft}`,
            borderLeft: `3px solid ${subjectColor}`,
            borderRadius: UP_TOKENS.r2, padding: '8px 10px',
          }}>
            <select value={slot.day} onChange={e => update(i, { day: e.target.value })} style={{
              fontSize: 12, fontFamily: UP_TOKENS.fontUI, padding: '5px 8px',
              background: UP_TOKENS.surface, border: `1px solid ${UP_TOKENS.line}`,
              borderRadius: UP_TOKENS.r1, color: UP_TOKENS.ink, cursor: 'pointer',
            }}>
              {WEEKDAY_OPTIONS.map(o => <option key={o.key} value={o.key}>{o.label}</option>)}
            </select>
            <input type="time" value={slot.start} onChange={e => update(i, { start: e.target.value })} style={{
              fontSize: 12, fontFamily: UP_TOKENS.fontMono, padding: '5px 6px',
              background: UP_TOKENS.surface, border: `1px solid ${UP_TOKENS.line}`,
              borderRadius: UP_TOKENS.r1, color: UP_TOKENS.ink, width: 90,
            }}/>
            <span style={{ color: UP_TOKENS.inkMuted, fontSize: 12 }}>–</span>
            <input type="time" value={slot.end} onChange={e => update(i, { end: e.target.value })} style={{
              fontSize: 12, fontFamily: UP_TOKENS.fontMono, padding: '5px 6px',
              background: UP_TOKENS.surface, border: `1px solid ${UP_TOKENS.line}`,
              borderRadius: UP_TOKENS.r1, color: UP_TOKENS.ink, width: 90,
            }}/>
            <input type="text" value={slot.label || ''} onChange={e => update(i, { label: e.target.value })}
              placeholder="Etiqueta (opcional)" style={{
              flex: 1, minWidth: 60,
              fontSize: 12, fontFamily: UP_TOKENS.fontUI, padding: '5px 8px',
              background: UP_TOKENS.surface, border: `1px solid ${UP_TOKENS.line}`,
              borderRadius: UP_TOKENS.r1, color: UP_TOKENS.ink, outline: 'none',
            }}/>
            <button onClick={() => remove(i)} title="Eliminar bloque" style={{
              background: 'transparent', border: 'none', cursor: 'pointer',
              color: UP_TOKENS.inkMuted, fontSize: 16, padding: '2px 6px', lineHeight: 1,
            }}>×</button>
          </div>
        ))}
        {(!schedule || schedule.length === 0) && (
          <div style={{
            fontSize: 12, fontFamily: UP_TOKENS.fontUI,
            color: UP_TOKENS.inkMuted, fontStyle: 'italic',
            padding: '6px 2px',
          }}>Sin horarios aún.</div>
        )}
      </div>
      <button onClick={add} style={{
        marginTop: 8, fontSize: 12, fontFamily: UP_TOKENS.fontUI,
        padding: '6px 12px', cursor: 'pointer',
        background: UP_TOKENS.surfaceAlt, border: `1px dashed ${UP_TOKENS.line}`,
        borderRadius: UP_TOKENS.rFull, color: UP_TOKENS.inkSoft, fontWeight: 500,
      }}>+ Agregar bloque horario</button>
    </div>
  );
};

const SubjectEditor = ({ subject, onSave, onCancel, onDelete }) => {
  const [name, setName] = React.useState(subject?.name || '');
  const [code, setCode] = React.useState(subject?.code || '');
  const [color, setColor] = React.useState(subject?.color || SUBJECT_COLORS[0]);
  const [isActive, setIsActive] = React.useState(subject?.isActive !== false);
  const [schedule, setSchedule] = React.useState(subject?.schedule || []);

  return (
    <div style={{
      background: UP_TOKENS.surface,
      border: `2px solid ${UP_TOKENS.accent}`,
      borderRadius: UP_TOKENS.r3, padding: 20,
      gridColumn: '1 / -1',
    }}>
      <TextInput value={name} onChange={setName} placeholder="Nombre de la materia" autoFocus
        style={{ background: UP_TOKENS.bg, marginBottom: 10 }}/>
      <TextInput value={code} onChange={setCode} placeholder="Código (opcional)" size="sm"
        style={{ background: UP_TOKENS.bg, marginBottom: 14 }}/>
      <Label style={{ marginBottom: 8 }}>Color</Label>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 }}>
        {SUBJECT_COLORS.map(c => (
          <button key={c} onClick={() => setColor(c)} style={{
            width: 26, height: 26, borderRadius: '50%', background: c, cursor: 'pointer',
            border: color === c ? `2px solid ${UP_TOKENS.ink}` : `2px solid transparent`,
            outline: 'none',
          }}/>
        ))}
      </div>
      <ScheduleEditor schedule={schedule} onChange={setSchedule} subjectColor={color} />
      <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, fontFamily: UP_TOKENS.fontUI, marginBottom: 16, cursor: 'pointer' }}>
        <input type="checkbox" checked={isActive} onChange={e => setIsActive(e.target.checked)} />
        Materia activa (cuatrimestre en curso)
      </label>
      <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
        {onDelete && <Button variant="danger" size="sm" onClick={onDelete}>Eliminar</Button>}
        <Button variant="ghost" size="sm" onClick={onCancel}>Cancelar</Button>
        <Button variant="primary" size="sm" onClick={() => onSave({ name, code, color, isActive, schedule })} disabled={!name.trim()}>
          Guardar
        </Button>
      </div>
    </div>
  );
};

Object.assign(window, { Subjects });

</script>

<script type="text/babel">
// Vida Personal — listas tipo checklist, sin fechas ni calendario

const PersonalLife = ({ state, dispatch, compact }) => {
  const { personalLists } = state;
  const [addingList, setAddingList] = React.useState(false);
  const [newListName, setNewListName] = React.useState('');
  const [editingListId, setEditingListId] = React.useState(null);

  const submitNewList = () => {
    const name = newListName.trim();
    if (!name) return;
    dispatch({ type: 'ADD_PERSONAL_LIST', name });
    setNewListName('');
    setAddingList(false);
  };

  return (
    <div style={{ padding: compact ? 16 : 32, maxWidth: 1080, margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 20, flexWrap: 'wrap', gap: 10 }}>
        <div>
          <SectionTitle size={compact ? 'md' : 'lg'}>Vida personal</SectionTitle>
          <div style={{ fontSize: 13, color: UP_TOKENS.inkSoft, fontFamily: UP_TOKENS.fontUI, marginTop: 2 }}>
            Listas livianas para todo lo que no va en la agenda.
          </div>
        </div>
        <Button variant="primary" size="sm" icon="plus" onClick={() => setAddingList(true)}>
          Nueva lista
        </Button>
      </div>

      {addingList && (
        <div style={{
          background: UP_TOKENS.surface,
          border: `2px solid ${UP_TOKENS.accent}`,
          borderRadius: UP_TOKENS.r3,
          padding: 16, marginBottom: 16,
          display: 'flex', gap: 8, alignItems: 'center',
        }}>
          <input
            autoFocus
            value={newListName}
            onChange={e => setNewListName(e.target.value)}
            onKeyDown={e => {
              if (e.key === 'Enter') submitNewList();
              if (e.key === 'Escape') { setAddingList(false); setNewListName(''); }
            }}
            placeholder='Nombre de la lista — "Fin de semana", "Súper", "Casa"…'
            style={{
              flex: 1, fontSize: 16, fontFamily: UP_TOKENS.fontDisplay,
              background: UP_TOKENS.bg, border: `1px solid ${UP_TOKENS.line}`,
              borderRadius: UP_TOKENS.r1, padding: '10px 12px',
              color: UP_TOKENS.ink, outline: 'none',
            }}
          />
          <Button variant="ghost" size="sm" onClick={() => { setAddingList(false); setNewListName(''); }}>
            Cancelar
          </Button>
          <Button variant="primary" size="sm" onClick={submitNewList} disabled={!newListName.trim()}>
            Crear
          </Button>
        </div>
      )}

      {personalLists.length === 0 && !addingList && (
        <div style={{
          textAlign: 'center', padding: '48px 20px',
          fontFamily: UP_TOKENS.fontUI, color: UP_TOKENS.inkMuted,
        }}>
          <div style={{ fontSize: 36, marginBottom: 12, opacity: 0.3 }}>◌</div>
          <div style={{ fontSize: 14, marginBottom: 4 }}>Sin listas todavía.</div>
          <div style={{ fontSize: 12 }}>Creá tu primera lista para arrancar.</div>
        </div>
      )}

      <div style={{
        display: 'grid', gap: compact ? 12 : 16,
        gridTemplateColumns: compact ? '1fr' : 'repeat(auto-fill, minmax(300px, 1fr))',
        alignItems: 'start',
      }}>
        {personalLists.map(list => (
          <PersonalListCard
            key={list.id}
            list={list}
            compact={compact}
            editing={editingListId === list.id}
            onStartEditing={() => setEditingListId(list.id)}
            onStopEditing={() => setEditingListId(null)}
            dispatch={dispatch}
          />
        ))}
      </div>
    </div>
  );
};

const PersonalListCard = ({ list, compact, editing, onStartEditing, onStopEditing, dispatch }) => {
  const [newItem, setNewItem] = React.useState('');
  const [nameDraft, setNameDraft] = React.useState(list.name);
  const inputRef = React.useRef(null);

  const totalItems = list.tasks.length;
  const doneItems = list.tasks.filter(t => t.done).length;
  const allDone = totalItems > 0 && doneItems === totalItems;

  React.useEffect(() => { setNameDraft(list.name); }, [list.name]);

  const addItem = () => {
    const text = newItem.trim();
    if (!text) return;
    dispatch({ type: 'ADD_PERSONAL_ITEM', listId: list.id, text });
    setNewItem('');
    setTimeout(() => inputRef.current?.focus(), 0);
  };

  const saveName = () => {
    const n = nameDraft.trim();
    if (n && n !== list.name) dispatch({ type: 'RENAME_PERSONAL_LIST', listId: list.id, name: n });
    onStopEditing();
  };

  return (
    <div style={{
      background: UP_TOKENS.surface,
      border: `1px solid ${UP_TOKENS.line}`,
      borderRadius: UP_TOKENS.r3,
      padding: 18,
      opacity: allDone ? 0.72 : 1,
      transition: 'opacity 200ms',
      position: 'relative',
    }}>
      {/* header: name + progress + menu */}
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10, marginBottom: 14 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          {editing ? (
            <input
              autoFocus
              value={nameDraft}
              onChange={e => setNameDraft(e.target.value)}
              onBlur={saveName}
              onKeyDown={e => {
                if (e.key === 'Enter') saveName();
                if (e.key === 'Escape') { setNameDraft(list.name); onStopEditing(); }
              }}
              style={{
                width: '100%',
                fontFamily: UP_TOKENS.fontDisplay, fontSize: 22,
                fontWeight: 400, color: UP_TOKENS.ink, letterSpacing: -0.2,
                background: UP_TOKENS.bg, border: `1px solid ${UP_TOKENS.line}`,
                borderRadius: UP_TOKENS.r1, padding: '4px 8px',
                outline: 'none',
              }}
            />
          ) : (
            <div onClick={onStartEditing} style={{
              fontFamily: UP_TOKENS.fontDisplay, fontSize: 22, fontWeight: 400,
              color: UP_TOKENS.ink, letterSpacing: -0.2, cursor: 'text',
              textDecoration: allDone ? 'line-through' : 'none',
              textDecorationColor: UP_TOKENS.inkMuted,
              textDecorationThickness: '1.5px',
              wordBreak: 'break-word',
            }}>
              {list.name}
            </div>
          )}
          <div style={{
            fontSize: 11, letterSpacing: 0.5, color: UP_TOKENS.inkMuted,
            fontFamily: UP_TOKENS.fontMono, marginTop: 4,
          }}>
            {totalItems === 0 ? 'vacía' : `${doneItems} / ${totalItems}`}
            {allDone && <span style={{ color: UP_TOKENS.accent, marginLeft: 8, fontWeight: 600, fontFamily: UP_TOKENS.fontUI, letterSpacing: 0.8 }}>✓ LISTO</span>}
          </div>
        </div>
        <IconButton icon="trash" size={28}
          title="Eliminar lista"
          onClick={() => {
            if (window.confirm(`¿Eliminar la lista "${list.name}"?`)) {
              dispatch({ type: 'DELETE_PERSONAL_LIST', listId: list.id });
            }
          }}/>
      </div>

      {/* progress bar */}
      {totalItems > 0 && (
        <div style={{
          height: 3, background: UP_TOKENS.lineSoft, borderRadius: 2,
          marginBottom: 12, overflow: 'hidden',
        }}>
          <div style={{
            width: `${(doneItems / totalItems) * 100}%`,
            height: '100%',
            background: allDone ? UP_TOKENS.accent : UP_TOKENS.accentSoft,
            transition: 'width 200ms',
          }}/>
        </div>
      )}

      {/* items */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 2, marginBottom: 8 }}>
        {list.tasks.map(t => (
          <PersonalItem key={t.id} item={t} listId={list.id} dispatch={dispatch} />
        ))}
      </div>

      {/* add item */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        padding: '6px 4px',
        borderTop: list.tasks.length > 0 ? `1px dashed ${UP_TOKENS.lineSoft}` : 'none',
        paddingTop: list.tasks.length > 0 ? 10 : 4,
      }}>
        <div style={{
          width: 16, height: 16, borderRadius: 4,
          border: `1.5px dashed ${UP_TOKENS.line}`,
          flexShrink: 0,
        }}/>
        <input
          ref={inputRef}
          value={newItem}
          onChange={e => setNewItem(e.target.value)}
          onKeyDown={e => {
            if (e.key === 'Enter') addItem();
          }}
          placeholder="Agregar ítem…"
          style={{
            flex: 1, fontSize: 14, fontFamily: UP_TOKENS.fontUI,
            background: 'transparent', border: 'none',
            color: UP_TOKENS.ink, outline: 'none',
            padding: '4px 0',
          }}
        />
        {newItem.trim() && (
          <button onClick={addItem} style={{
            fontSize: 11, fontFamily: UP_TOKENS.fontUI,
            background: UP_TOKENS.accent, color: '#FBFAF5',
            border: 'none', padding: '4px 10px', borderRadius: UP_TOKENS.rFull,
            cursor: 'pointer', fontWeight: 500,
          }}>+ Add</button>
        )}
      </div>
    </div>
  );
};

const PersonalItem = ({ item, listId, dispatch }) => {
  const [hover, setHover] = React.useState(false);
  return (
    <div
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'flex', alignItems: 'flex-start', gap: 10,
        padding: '6px 4px',
        borderRadius: UP_TOKENS.r1,
        background: hover ? UP_TOKENS.bgAlt : 'transparent',
        transition: 'background 120ms',
      }}>
      <button
        onClick={() => dispatch({ type: 'TOGGLE_PERSONAL_ITEM', listId, itemId: item.id })}
        style={{
          width: 18, height: 18, flexShrink: 0,
          borderRadius: 4,
          border: `1.5px solid ${item.done ? UP_TOKENS.accent : UP_TOKENS.line}`,
          background: item.done ? UP_TOKENS.accent : 'transparent',
          cursor: 'pointer', padding: 0,
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          marginTop: 1,
        }}>
        {item.done && (
          <svg width="12" height="12" viewBox="0 0 20 20" fill="none"
               stroke="#FBFAF5" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M4 10.5l4 4 8-9"/>
          </svg>
        )}
      </button>
      <div style={{
        flex: 1,
        fontSize: 14, fontFamily: UP_TOKENS.fontUI,
        color: item.done ? UP_TOKENS.inkMuted : UP_TOKENS.ink,
        textDecoration: item.done ? 'line-through' : 'none',
        textDecorationColor: UP_TOKENS.inkMuted,
        textDecorationThickness: '1px',
        wordBreak: 'break-word', lineHeight: 1.4,
        cursor: 'pointer',
      }}
      onClick={() => dispatch({ type: 'TOGGLE_PERSONAL_ITEM', listId, itemId: item.id })}>
        {item.text}
      </div>
      {hover && (
        <button onClick={() => dispatch({ type: 'DELETE_PERSONAL_ITEM', listId, itemId: item.id })}
          style={{
            background: 'transparent', border: 'none', cursor: 'pointer',
            color: UP_TOKENS.inkMuted, fontSize: 14, padding: '0 4px', lineHeight: 1,
          }} title="Eliminar">×</button>
      )}
    </div>
  );
};

Object.assign(window, { PersonalLife });

</script>

    }}>
      {/* Logo */}

<script type="text/babel">

// ─── App state ─────────────────────────────────────────────────
const initialState = {
  subjects: SUBJECTS,
  tasks: TASKS,
  events: EVENTS,
  quickNotes: QUICK_NOTES,
  personalLists: PERSONAL_LISTS,
  now: TODAY,
};

const reducer = (state, action) => {
  switch (action.type) {
    case 'TOGGLE_TASK': {
      return {
        ...state,
        tasks: state.tasks.map(t => t.id === action.id
          ? { ...t,
              status: t.status === 'COMPLETED' ? 'NOT_STARTED' : 'COMPLETED',
              completedAt: t.status === 'COMPLETED' ? null : new Date().toISOString(),
            }
          : t)
      };
    }
    case 'UPDATE_TASK':
      return { ...state, tasks: state.tasks.map(t => t.id === action.id ? { ...t, ...action.changes } : t) };
    case 'DELETE_TASK':
      return { ...state, tasks: state.tasks.filter(t => t.id !== action.id && t.parentTaskId !== action.id) };
    case 'ADD_TASK_PROMPT': {
      const title = window.prompt('Nueva tarea:');
      if (!title || !title.trim()) return state;
      const newT = {
        id: 't-' + Math.random().toString(36).slice(2, 9),
        subjectId: null, parentTaskId: null, title: title.trim(),
        priority: 'MEDIUM', status: 'NOT_STARTED',
        dueDate: null, observations: null, createdAt: new Date().toISOString(),
      };
      return { ...state, tasks: [newT, ...state.tasks] };
    }
    case 'ADD_NOTE': {
      const n = { id: 'n-' + Math.random().toString(36).slice(2,9), text: action.text, createdAt: new Date().toISOString() };
      return { ...state, quickNotes: [n, ...state.quickNotes] };
    }
    case 'DELETE_NOTE':
      return { ...state, quickNotes: state.quickNotes.filter(n => n.id !== action.id) };
    case 'ADD_SUBJECT': {
      const s = { id: 'sub-' + Math.random().toString(36).slice(2,8), name: action.name, code: action.code, color: action.color, isActive: action.isActive, schedule: action.schedule || [] };
      return { ...state, subjects: [...state.subjects, s] };
    }
    case 'UPDATE_SUBJECT':
      return { ...state, subjects: state.subjects.map(s => s.id === action.id ? { ...s, ...action.changes } : s) };
    case 'DELETE_SUBJECT':
      return { ...state, subjects: state.subjects.filter(s => s.id !== action.id) };
    case 'ADD_PERSONAL_LIST': {
      const list = { id: 'pl-' + Math.random().toString(36).slice(2,8), name: action.name, tasks: [] };
      return { ...state, personalLists: [list, ...state.personalLists] };
    }
    case 'RENAME_PERSONAL_LIST':
      return { ...state, personalLists: state.personalLists.map(l => l.id === action.listId ? { ...l, name: action.name } : l) };
    case 'DELETE_PERSONAL_LIST':
      return { ...state, personalLists: state.personalLists.filter(l => l.id !== action.listId) };
    case 'ADD_PERSONAL_ITEM': {
      const item = { id: 'pi-' + Math.random().toString(36).slice(2,8), text: action.text, done: false };
      return { ...state, personalLists: state.personalLists.map(l => l.id === action.listId ? { ...l, tasks: [...l.tasks, item] } : l) };
    }
    case 'TOGGLE_PERSONAL_ITEM':
      return { ...state, personalLists: state.personalLists.map(l =>
        l.id === action.listId ? { ...l, tasks: l.tasks.map(t => t.id === action.itemId ? { ...t, done: !t.done } : t) } : l
      )};
    case 'DELETE_PERSONAL_ITEM':
      return { ...state, personalLists: state.personalLists.map(l =>
        l.id === action.listId ? { ...l, tasks: l.tasks.filter(t => t.id !== action.itemId) } : l
      )};
    default:
      return state;
  }
};

// ─── Main app ──────────────────────────────────────────────────
const UniPlannerApp = ({ compact, state, dispatch, route, setRoute, syncStatus, onLogin, loggedIn }) => {
  if (!loggedIn) return <LoginScreen onLogin={onLogin} compact={compact} />;
  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: UP_TOKENS.bg }}>
      {compact ? (
        <>
          <MobileTopBar active={route} syncStatus={syncStatus} />
          <SyncBanner status={syncStatus === 'synced' ? null : syncStatus} />
          {(route === 'tasks-table' || route === 'tasks-tree') && (
            <TasksTabSwitcher active={route} onChange={setRoute} />
          )}
          <div className="up-scroll" style={{ flex: 1, overflow: 'auto' }}>
            {route === 'dashboard'    && <Dashboard state={state} dispatch={dispatch} navigate={setRoute} compact />}
            {route === 'calendar'     && <Calendar state={state} dispatch={dispatch} compact />}
            {route === 'tasks-table'  && <TasksTable state={state} dispatch={dispatch} compact />}
            {route === 'tasks-tree'   && <TasksTree state={state} dispatch={dispatch} compact />}
            {route === 'subjects'     && <Subjects state={state} dispatch={dispatch} navigate={setRoute} compact />}
            {route === 'personal'     && <PersonalLife state={state} dispatch={dispatch} compact />}
          </div>
          <BottomNav active={route} onNavigate={setRoute} />
        </>
      ) : (
        <div style={{ display: 'flex', height: '100%' }}>
          <Sidebar active={route} onNavigate={setRoute} syncStatus={syncStatus} />
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, background: UP_TOKENS.bg }}>
            <SyncBanner status={syncStatus === 'synced' ? null : syncStatus} />
            {(route === 'tasks-table' || route === 'tasks-tree') && (
              <div style={{ padding: '8px 32px 0', background: UP_TOKENS.bg }}>
                <div style={{ display: 'flex', gap: 6 }}>
                  {[['tasks-table','Tabla','list'],['tasks-tree','Por materia','tree']].map(([id,label,icon]) => (
                    <button key={id} onClick={() => setRoute(id)} style={{
                      padding: '6px 14px', fontSize: 12, fontFamily: UP_TOKENS.fontUI,
                      background: route === id ? UP_TOKENS.accentSoft : 'transparent',
                      color: route === id ? UP_TOKENS.accentInk : UP_TOKENS.inkSoft,
                      border: 'none', borderRadius: UP_TOKENS.rFull, cursor: 'pointer',
                      display: 'flex', alignItems: 'center', gap: 6, fontWeight: 500,
                    }}>
                      <Icon name={icon} size={14}/>
                      {label}
                    </button>
                  ))}
                </div>
              </div>
            )}
            <div className="up-scroll" style={{ flex: 1, overflow: 'auto' }}>
              {route === 'dashboard'    && <Dashboard state={state} dispatch={dispatch} navigate={setRoute} />}
              {route === 'calendar'     && <Calendar state={state} dispatch={dispatch} />}
              {route === 'tasks-table'  && <TasksTable state={state} dispatch={dispatch} />}
              {route === 'tasks-tree'   && <TasksTree state={state} dispatch={dispatch} />}
              {route === 'subjects'     && <Subjects state={state} dispatch={dispatch} navigate={setRoute} />}
              {route === 'personal'     && <PersonalLife state={state} dispatch={dispatch} />}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── Root (stage with mobile + desktop side by side) ───────────
const Root = () => {
  const [state, dispatch] = React.useReducer(reducer, initialState);
  const [desktopRoute, setDesktopRoute] = React.useState(() => localStorage.getItem('up_desktop_route') || 'dashboard');
  const [mobileRoute,  setMobileRoute]  = React.useState(() => localStorage.getItem('up_mobile_route')  || 'dashboard');
  const [desktopLoggedIn, setDesktopLoggedIn] = React.useState(true);
  const [mobileLoggedIn,  setMobileLoggedIn]  = React.useState(true);

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "oklch(0.55 0.12 145)",
    "density": "cómoda",
    "calView": "week",
    "syncStatus": "synced",
    "layout": "both"
  }/*EDITMODE-END*/;

  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  // Tweak protocol
  React.useEffect(() => {
    const onMsg = (ev) => {
      if (ev.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (ev.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Persist routes
  React.useEffect(() => localStorage.setItem('up_desktop_route', desktopRoute), [desktopRoute]);
  React.useEffect(() => localStorage.setItem('up_mobile_route', mobileRoute), [mobileRoute]);

  // Apply accent via CSS var override
  React.useEffect(() => {
    if (tweaks.accent !== UP_TOKENS.accent) {
      UP_TOKENS.accent = tweaks.accent;
      const lighter = tweaks.accent.replace('0.55 0.12', '0.94 0.03')
                                   .replace('0.55 0.15', '0.94 0.03')
                                   .replace('0.62 0.13', '0.94 0.03');
      const darker = tweaks.accent.replace('0.55 0.12', '0.32 0.08')
                                  .replace('0.55 0.15', '0.32 0.08')
                                  .replace('0.62 0.13', '0.32 0.08');
      const dim = tweaks.accent.replace('0.55 0.12', '0.80 0.06')
                               .replace('0.55 0.15', '0.80 0.06')
                               .replace('0.62 0.13', '0.80 0.06');
      UP_TOKENS.accentSoft = lighter;
      UP_TOKENS.accentInk = darker;
      UP_TOKENS.accentDim = dim;
      // Force re-render
      setLayoutKey(k => k + 1);
    }
  }, [tweaks.accent]);

  // sync cal view with tweak
  React.useEffect(() => { /* Calendar reads tweak? we pass via context via simpler: noop */ }, [tweaks.calView]);

  const [layoutKey, setLayoutKey] = React.useState(0);

  const layout = tweaks.layout || 'both';

  // Scaled presentation
  const stageRef = React.useRef();
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const fit = () => {
      if (!stageRef.current) return;
      const target = stageRef.current.firstChild;
      if (!target) return;
      const avail = window.innerWidth - 48;
      const availH = window.innerHeight - 48;
      const baseW = target.offsetWidth;
      const baseH = target.offsetHeight;
      const s = Math.min(avail / baseW, availH / baseH, 1);
      setScale(s);
    };
    fit();
    window.addEventListener('resize', fit);
    const id = setInterval(fit, 500);
    return () => { window.removeEventListener('resize', fit); clearInterval(id); };
  }, [layout, layoutKey]);

  const showMobile = layout === 'both' || layout === 'mobile';
  const showDesktop = layout === 'both' || layout === 'desktop';
  const showLogin = layout === 'login';

  return (
    <div style={{
      minHeight: '100vh', width: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 24, fontFamily: UP_TOKENS.fontUI,
    }}>
      <div ref={stageRef} style={{
        transform: `scale(${scale})`, transformOrigin: 'center',
      }}>
        <div key={layoutKey} style={{
          display: 'flex', alignItems: 'center', gap: 36,
          padding: '10px',
        }}>
          {showLogin && (
            <div style={{
              width: 420, height: 720,
              background: UP_TOKENS.surface,
              borderRadius: UP_TOKENS.r4,
              boxShadow: UP_TOKENS.shadowLg,
              overflow: 'hidden',
              border: `1px solid ${UP_TOKENS.line}`,
            }}>
              <LoginScreen onLogin={()=>{}} compact={true} />
            </div>
          )}

          {showDesktop && !showLogin && (
            <div>
              <div style={{
                fontSize: 11, textTransform: 'uppercase', letterSpacing: 1.4,
                color: UP_TOKENS.inkMuted, fontWeight: 600, marginBottom: 10,
                fontFamily: UP_TOKENS.fontUI, paddingLeft: 4,
              }}>◦ Desktop · navegador</div>
              <div style={{
                width: 1200, height: 780,
                background: UP_TOKENS.surface,
                borderRadius: 14, overflow: 'hidden',
                boxShadow: '0 24px 80px rgba(44,42,38,0.14), 0 0 0 1px rgba(44,42,38,0.06)',
              }}>
                <div style={{
                  height: 40, background: '#E4DED0',
                  display: 'flex', alignItems: 'center', padding: '0 14px', gap: 8,
                  borderBottom: `1px solid ${UP_TOKENS.line}`,
                }}>
                  <div style={{ display: 'flex', gap: 6 }}>
                    <div style={{ width: 11, height: 11, borderRadius: '50%', background: '#D98880' }}/>
                    <div style={{ width: 11, height: 11, borderRadius: '50%', background: '#E8B86D' }}/>
                    <div style={{ width: 11, height: 11, borderRadius: '50%', background: '#85C1A1' }}/>
                  </div>
                  <div style={{
                    flex: 1, textAlign: 'center',
                    fontSize: 12, fontFamily: UP_TOKENS.fontUI,
                    color: UP_TOKENS.inkSoft,
                  }}>
                    <span style={{
                      background: UP_TOKENS.bg, padding: '4px 16px', borderRadius: UP_TOKENS.rFull,
                      border: `1px solid ${UP_TOKENS.lineSoft}`,
                    }}>
                      ⌂ uniplanner.app/{desktopRoute}
                    </span>
                  </div>
                  <div style={{ width: 40 }}/>
                </div>
                <div style={{ height: 740 }}>
                  <UniPlannerApp compact={false} state={state} dispatch={dispatch}
                    route={desktopRoute} setRoute={setDesktopRoute}
                    syncStatus={tweaks.syncStatus}
                    onLogin={() => setDesktopLoggedIn(true)} loggedIn={desktopLoggedIn}/>
                </div>
              </div>
            </div>
          )}

          {showMobile && !showLogin && (
            <div>
              <div style={{
                fontSize: 11, textTransform: 'uppercase', letterSpacing: 1.4,
                color: UP_TOKENS.inkMuted, fontWeight: 600, marginBottom: 10,
                fontFamily: UP_TOKENS.fontUI, paddingLeft: 4,
              }}>◦ Móvil · PWA</div>
              <div style={{
                width: 400, height: 780,
                background: UP_TOKENS.bg,
                borderRadius: 38,
                boxShadow: '0 24px 80px rgba(44,42,38,0.18)',
                border: `10px solid #2C2A26`,
                overflow: 'hidden',
                position: 'relative',
              }}>
                {/* Status bar */}
                <div style={{
                  height: 32, background: UP_TOKENS.bg,
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  padding: '0 22px', fontSize: 13, fontFamily: UP_TOKENS.fontMono,
                  color: UP_TOKENS.ink, fontWeight: 500,
                }}>
                  <span>9:42</span>
                  <div style={{
                    position: 'absolute', left: '50%', top: 10,
                    transform: 'translateX(-50%)',
                    width: 20, height: 20, borderRadius: '50%',
                    background: '#1A1816',
                  }}/>
                  <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                    <Icon name={tweaks.syncStatus === 'offline' ? 'wifiOff' : 'wifi'} size={14} strokeWidth={2}/>
                    <span>87%</span>
                  </div>
                </div>
                <div style={{ height: 'calc(100% - 32px)', background: UP_TOKENS.bg }}>
                  <UniPlannerApp compact={true} state={state} dispatch={dispatch}
                    route={mobileRoute} setRoute={setMobileRoute}
                    syncStatus={tweaks.syncStatus}
                    onLogin={() => setMobileLoggedIn(true)} loggedIn={mobileLoggedIn}/>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>

      {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={() => {
        setTweaksOpen(false);
        window.parent.postMessage({ type: '__edit_mode_closed' }, '*');
      }} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);

</script>
</body>
</html>
